<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مسبحة الأذكار الذكية</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#00b894">

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    
    <style>
        * {
            -webkit-tap-highlight-color: transparent !important;
            -webkit-touch-callout: none !important;
            -webkit-user-select: none !important;
            -khtml-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
        }

        :root {
            --primary: #00b894;
            --completed: #fdcb6e; 
            --bg-grad: linear-gradient(135deg, #e8fafa 0%, #a6e3d7 100%);
            --card-bg: rgba(255, 255, 255, 0.92);
            --text-main: #2d3436;
            --text-muted: #636e72;
            --ring-bg: rgba(241, 242, 246, 0.8);
            --chip-bg: rgba(241, 242, 246, 0.9);
            --modal-bg: #ffffff;
            --cancel-bg: #f1f2f6;
            --header-bg: rgba(0, 184, 148, 0.1);
        }

        body.dark-mode {
            --bg-grad: linear-gradient(135deg, #1e272e 0%, #2f3640 100%);
            --card-bg: rgba(45, 52, 54, 0.85);
            --text-main: #f5f6fa;
            --text-muted: #a4b0be;
            --ring-bg: rgba(87, 101, 116, 0.4);
            --chip-bg: rgba(87, 101, 116, 0.6);
            --modal-bg: #2d3436;
            --cancel-bg: #576574;
            --header-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg-grad);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 10vh;
            height: 100dvh;
            overflow: hidden;
            margin: 0;
            color: var(--text-main);
            box-sizing: border-box;
            touch-action: manipulation;
            transition: background 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        button { font-family: 'Cairo', sans-serif; outline: none; border: none; cursor: pointer; z-index: 10; }

        .container {
            background: var(--card-bg);
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            text-align: center;
            width: 95%;
            max-width: 380px;
            backdrop-filter: blur(10px);
            overflow: hidden;
            position: relative;
            z-index: 5;
        }

        .header-bar {
            background: var(--header-bg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .main-content { padding: 20px 15px 30px; position: relative; }

        .zikr-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
        }

        .chip {
            background: var(--chip-bg);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
            transition: 0.3s;
        }

        .chip.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 8px 15px rgba(0, 184, 148, 0.3);
        }

        .counter-box {
            position: relative;
            width: 190px;
            height: 190px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px auto;
            pointer-events: none;
        }

        .counter { font-size: 4.5rem; font-weight: 900; color: var(--text-main); transition: transform 0.1s ease-out; }

        .click-area { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .ripple {
            position: absolute;
            background: var(--primary);
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-effect 0.6s linear;
            pointer-events: none;
            opacity: 0.4;
        }

        @keyframes ripple-effect { to { transform: scale(4); opacity: 0; } }

        .control-btns { display: flex; justify-content: center; gap: 20px; margin-top: 15px; position: relative; z-index: 10; }

        .icon-btn { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .reset-btn { background: rgba(255, 118, 117, 0.1); color: #ff7675; border: 2px solid #ff7675; }
        .undo-btn { background: rgba(108, 92, 231, 0.1); color: #6c5ce7; border: 2px solid #6c5ce7; }
        .history-btn { background: rgba(0, 184, 148, 0.1); color: var(--primary); border: 2px solid var(--primary); }

        .modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            display: none; align-items: flex-end; justify-content: center; z-index: 1000;
        }
        .modal-overlay.active { display: flex; }
        .modal-box { background: var(--modal-bg); padding: 30px 20px; border-radius: 30px 30px 0 0; width: 100%; max-width: 500px; }

        .dua-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.75); backdrop-filter: blur(8px);
            display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px;
        }
        .dua-overlay.active { display: flex; }
        .dua-box {
            background: var(--card-bg); padding: 35px 25px; border-radius: 25px; width: 100%; max-width: 380px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .dua-text { font-size: 1.3rem; font-weight: 900; color: var(--text-main); line-height: 1.8; margin-bottom: 25px; }
        @keyframes popIn { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body id="bodyArea">

<div style="position: absolute; top: 10px; width: 100%; padding: 0 20px; z-index: 100; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; font-weight: bold;">
    <span>ادعيلي بالهداية</span>
    <span dir="ltr">By: Mahmoud Tellawy</span>
</div>

<div class="container" id="mainContainer">
    <div class="click-area" id="clickArea"></div>
    <div class="header-bar">
        <p style="font-size: 0.9rem; font-weight: 700; color: var(--primary); margin: 0;">مسبحة الأذكار</p>
        <button id="themeToggle" style="background:none; font-size:1.5rem;">🌙</button>
    </div>

    <div class="main-content">
        <div class="zikr-grid" id="zikrContainer">
            </div>

        <div class="counter-box">
            <svg class="progress-ring" width="190" height="190" style="position:absolute; transform: rotate(-90deg);">
                <circle stroke="var(--ring-bg)" stroke-width="8" fill="transparent" r="85" cx="95" cy="95"/>
                <circle id="progressRing" stroke="var(--primary)" stroke-width="8" fill="transparent" r="85" cx="95" cy="95" stroke-linecap="round" style="transition: stroke-dashoffset 0.3s; opacity: 1;"/>
            </svg>
            <div class="counter" id="countDisplay">0</div>
        </div>
        
        <div class="control-btns">
            <button class="icon-btn history-btn" onclick="showHistoryModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:20px;"><path d="M12 8v4l3 3m6-3a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"></path></svg></button>
            <button class="icon-btn undo-btn" onclick="undoLast()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:20px;"><path d="M9 14 4 9l5-5"></path><path d="M4 9h10.5a5.5 5.5 0 0 1 5.5 5.5v0a5.5 5.5 0 0 1-5.5 5.5H11"></path></svg></button>
            <button class="icon-btn reset-btn" onclick="showModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:20px;"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path></svg></button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="resetModal">
    <div class="modal-box">
        <h3 style="text-align:center;">تصفير العداد؟</h3>
        <div style="display: flex; gap: 15px;">
            <button class="modal-btn" style="flex:1; background:#ff7675; color:white; padding:15px; border-radius:15px;" onclick="confirmReset()">تصفير</button>
            <button class="modal-btn" style="flex:1; background:var(--cancel-bg); padding:15px; border-radius:15px;" onclick="hideModal()">إلغاء</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="historyModal" style="align-items: flex-start;">
    <div class="modal-box" style="height: 100dvh; max-height: 100dvh; max-width: 100%; border-radius: 0; background: var(--bg-grad); display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;">
        <h3 style="text-align:center; margin-top: 10px; color: var(--text-main);">سجل التسبيح</h3>
        <div id="historyContent" style="flex: 1; overflow-y: auto; margin-top: 15px; padding-bottom: 20px;"></div>
        <button class="modal-btn" style="width:100%; margin-top:auto; background:var(--cancel-bg); color: var(--text-main); padding:15px; border-radius:15px; font-weight:bold;" onclick="hideHistoryModal()">رجوع للمسبحة</button>
    </div>
</div>

<div class="dua-overlay" id="duaModal">
    <div class="dua-box">
        <div class="dua-text" id="duaText"></div>
        <button class="modal-btn" style="width:100%; background:var(--primary); color:white; padding:15px; border-radius:15px; font-weight:bold; font-size: 1.1rem;" onclick="closeDuaModal()">آمين يا رب</button>
    </div>
</div>

<script>
    const countDisplay = document.getElementById("countDisplay"),
          clickArea = document.getElementById("clickArea"),
          progressRing = document.getElementById("progressRing"),
          themeToggle = document.getElementById("themeToggle");

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const circ = 85 * 2 * Math.PI;
    progressRing.style.strokeDasharray = circ;

    let db;
    let zikrCounts = { 'سبحان الله':0, 'الحمد لله':0, 'الله أكبر':0, 'أستغفر الله':0, 'لا حول ولا قوة إلا بالله':0 };
    let zikrLifetime = { 'سبحان الله':0, 'الحمد لله':0, 'الله أكبر':0, 'أستغفر الله':0, 'لا حول ولا قوة إلا بالله':0 };
    let activeZikr = localStorage.getItem('activeZikr') || 'سبحان الله';
    
    // الوضع الليلي التلقائي: بيشتغل من 6 مساءً لـ 6 صباحاً لو المستخدم مغيرهوش يدوي
    let isDarkMode = localStorage.getItem('theme') === 'dark';
    const currentHour = new Date().getHours();
    if (localStorage.getItem('theme_manual') !== 'true') {
        isDarkMode = (currentHour >= 18 || currentHour < 6);
    }

    const dbReq = indexedDB.open("MasbahaStorage", 2);
    dbReq.onupgradeneeded = (e) => {
        let database = e.target.result;
        if (!database.objectStoreNames.contains("counters")) database.createObjectStore("counters");
    };
    dbReq.onsuccess = (e) => {
        db = e.target.result;
        loadData();
    };

    function saveData() {
        if (!db) return;
        const tx = db.transaction("counters", "readwrite");
        const store = tx.objectStore("counters");
        store.put(zikrCounts, "daily");
        store.put(zikrLifetime, "lifetime");
    }

    function renderZikrChips() {
        const container = document.getElementById("zikrContainer");
        container.innerHTML = '';
        
        for (let zikr in zikrCounts) {
            const btn = document.createElement("button");
            btn.className = `chip ${zikr === activeZikr ? 'active' : ''}`;
            btn.innerText = zikr;
            btn.onclick = () => selectZikr(btn, zikr);
            container.appendChild(btn);
        }
        
        const addBtn = document.createElement("button");
        addBtn.className = "chip";
        addBtn.style.cssText = "background: var(--ring-bg); color: var(--primary); font-size: 1.2rem; font-weight: 900; padding: 4px 15px;";
        addBtn.innerText = "+";
        addBtn.onclick = () => {
            const newZikr = prompt("اكتب الذكر الجديد:");
            if (newZikr && newZikr.trim() !== "") {
                if (zikrCounts[newZikr] === undefined) {
                    zikrCounts[newZikr] = 0;
                    zikrLifetime[newZikr] = 0;
                    saveData();
                    renderZikrChips();
                } else {
                    alert("الذكر ده موجود بالفعل!");
                }
            }
        };
        container.appendChild(addBtn);
    }

    function loadData() {
        const tx = db.transaction("counters", "readonly");
        const store = tx.objectStore("counters");
        store.get("daily").onsuccess = (e) => { 
            if (e.target.result) zikrCounts = e.target.result; 
            updateUI(); 
            renderZikrChips();
        };
        store.get("lifetime").onsuccess = (e) => { 
            if (e.target.result) zikrLifetime = e.target.result; 
        };
    }

    function showRandomDua() {
        const randomIndex = Math.floor(Math.random() * duasList.length);
        document.getElementById('duaText').innerText = duasList[randomIndex];
        document.getElementById('duaModal').classList.add('active');
    }

    function closeDuaModal() { document.getElementById('duaModal').classList.remove('active'); playSoundEffect(400, 0.4, 0.1); }

    function checkDateAndReset() {
        const today = new Date().toLocaleDateString('en-CA');
        let storedDate = localStorage.getItem('lastDate');
        if (storedDate && storedDate !== today) {
            for (let key in zikrCounts) { 
                zikrLifetime[key] = (Number(zikrLifetime[key]) || 0) + (Number(zikrCounts[key]) || 0); 
                zikrCounts[key] = 0;
            }
            saveData();
        }
        localStorage.setItem('lastDate', today);
    }

    window.onload = () => { checkDateAndReset(); showRandomDua(); updateUI(); };

    function playSoftClick(isLimit) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(isLimit ? 600 : 400, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.8, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15); 
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.15);
    }

    function playSoundEffect(freq, vol, duration) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function handleTap(e) {
        if(e.target.closest('button')) return;
        checkDateAndReset(); 
        zikrCounts[activeZikr]++;
        saveData();
        updateUI();
        
        countDisplay.style.transform = 'scale(1.2)';
        setTimeout(() => countDisplay.style.transform = 'scale(1)', 100);
        const rect = clickArea.getBoundingClientRect();
        const clientX = e.clientX !== undefined ? e.clientX : e.touches[0].clientX;
        const clientY = e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
        const ripple = document.createElement('div');
        ripple.className = 'ripple';
        ripple.style.left = `${(clientX - rect.left) - 25}px`;
        ripple.style.top = `${(clientY - rect.top) - 25}px`;
        ripple.style.width = ripple.style.height = '50px';
        clickArea.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);

        const targeted = ['سبحان الله', 'الحمد لله', 'الله أكبر'];
        const isLimit = targeted.includes(activeZikr) && zikrCounts[activeZikr] > 0 && zikrCounts[activeZikr] % 33 === 0;
        playSoftClick(isLimit);
        if(navigator.vibrate) navigator.vibrate(isLimit ? [50, 30, 50] : 15);
    }

    clickArea.addEventListener('pointerdown', handleTap);

    function updateUI() {
        countDisplay.innerText = zikrCounts[activeZikr];
        document.body.classList.toggle('dark-mode', isDarkMode);
        themeToggle.innerText = isDarkMode ? '☀️' : '🌙';
        const targeted = ['سبحان الله', 'الحمد لله', 'الله أكبر'];
        if (targeted.includes(activeZikr)) {
            progressRing.style.opacity = '1';
            let step = zikrCounts[activeZikr] % 33 || (zikrCounts[activeZikr] > 0 ? 33 : 0);
            progressRing.style.strokeDashoffset = circ - (step / 33) * circ;
            progressRing.style.stroke = (step === 33) ? 'var(--completed)' : 'var(--primary)';
        } else { progressRing.style.opacity = '0'; }
    }

    function selectZikr(el, name) {
        activeZikr = name;
        localStorage.setItem('activeZikr', activeZikr);
        updateUI(); 
        renderZikrChips();
        playSoundEffect(500, 0.6, 0.1); 
    }

    themeToggle.onclick = () => {
        isDarkMode = !isDarkMode; 
        localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
        localStorage.setItem('theme_manual', 'true');
        updateUI(); 
        playSoundEffect(700, 0.5, 0.15); 
    };

    function undoLast() { if (zikrCounts[activeZikr] > 0) { zikrCounts[activeZikr]--; saveData(); updateUI(); playSoundEffect(400, 0.4, 0.1); } }
    function showModal() { document.getElementById('resetModal').classList.add('active'); }
    function hideModal() { document.getElementById('resetModal').classList.remove('active'); }
    function confirmReset() { zikrCounts[activeZikr] = 0; saveData(); updateUI(); hideModal(); playSoundEffect(300, 0.7, 0.2); }

    function showHistoryModal() {
        const historyContent = document.getElementById('historyContent');
        let html = '<div style="display: flex; flex-direction: column; gap: 20px;">';
        html += `<div style="background: var(--card-bg); border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 2px solid var(--primary);"><h4 style="text-align:center; color: var(--primary);">رصيدك عند الله</h4><div style="display: flex; flex-direction: column; gap: 8px;">`;
        let grandTotal = 0;
        
        Object.keys(zikrCounts).forEach(zikr => {
            let total = (Number(zikrLifetime[zikr]) || 0) + (Number(zikrCounts[zikr]) || 0);
            grandTotal += total;
            html += `<div style="background: var(--chip-bg); padding: 12px 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid var(--primary);"><span>${zikr}</span><span style="font-weight: 900; direction: ltr;">${total}</span></div>`;
        });
        
        html += `<div style="margin-top: 15px; padding-top: 15px; border-top: 2px dashed var(--primary); display: flex; justify-content: space-between; align-items: center;"><span style="font-weight: 900; color: var(--primary);">إجمالي التسبيح</span><span style="font-weight: 900; color: var(--primary); font-size: 1.3rem;">${grandTotal}</span></div></div></div></div>`;
        historyContent.innerHTML = html;
        document.getElementById('historyModal').classList.add('active');
        playSoundEffect(600, 0.5, 0.1);
    }
    
    function hideHistoryModal() { document.getElementById('historyModal').classList.remove('active'); playSoundEffect(400, 0.4, 0.1); }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('./sw.js');
        navigator.serviceWorker.addEventListener('controllerchange', () => { window.location.reload(); });
    }
</script>
