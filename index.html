
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المسبحة الذكية</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0fb9b1;
            --primary-light: #26de81;
            --bg: #f7f9fc;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-muted: #636e72;
            --completed: #20bf6b;
            --chip-bg: #f1f2f6;
            --shadow: 0 10px 30px rgba(0,0,0,0.08);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dark-mode {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --chip-bg: #334155;
            --shadow: 0 10px 40px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Tajawal', sans-serif; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background-color 0.5s ease;
        }

        .top-bar {
            padding: 15px 20px 10px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .actions-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        .zikr-selector-container { position: relative; flex: 1; max-width: 200px; }

        .active-zikr-pill {
            background: var(--card-bg);
            padding: 10px 16px;
            border-radius: 25px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
        }

        .active-zikr-pill.open { border-color: var(--primary); }

        #activeZikrName { font-weight: 700; font-size: 1.15rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .chevron { width: 12px; height: 12px; fill: var(--primary); transition: var(--transition); }
        .open .chevron { transform: rotate(180deg); }

        .zikr-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            right: 0;
            background: var(--card-bg);
            width: 250px;
            border-radius: 20px;
            box-shadow: 0 15px 45px rgba(0,0,0,0.15);
            padding: 10px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: var(--transition);
            z-index: 1000;
            max-height: 400px;
            overflow-y: auto;
        }

        .zikr-dropdown.active { opacity: 1; visibility: visible; transform: translateY(0); }

        .zikr-option-wrapper { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }

        .delete-zikr-btn {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            border: none;
            background: #fff0f0;
            color: #e17055;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: 0.2s;
        }
        .dark-mode .delete-zikr-btn { background: rgba(225,112,85,0.15); }
        .delete-zikr-btn:hover { background: #e17055; color: white; }

        .zikr-option {
            flex: 1;
            padding: 15px 18px;
            border-radius: 12px;
            border: none;
            background: transparent;
            color: var(--text-main);
            text-align: right;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .zikr-option:hover, .zikr-option.selected { background: var(--chip-bg); color: var(--primary); }

        .add-zikr-opt {
            width: 100%;
            padding: 12px;
            border: 2px dashed var(--primary);
            border-radius: 12px;
            background: transparent;
            color: var(--primary);
            font-weight: 700;
            cursor: pointer;
            margin-top: 5px;
        }

        .theme-btn, .vibration-btn {
            background: var(--card-bg);
            width: 45px;
            height: 45px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            cursor: pointer;
            font-size: 1.4rem;
            border: none;
            transition: var(--transition);
        }

        .vibration-btn.active {
            background: var(--primary);
            color: white;
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 0 20px 20px 20px;
            position: relative;
        }

        .click-area {
            position: absolute;
            inset: 0;
            z-index: 5;
            cursor: pointer;
        }

        .stats-grid-container {
            width: 100%;
            max-width: 350px;
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
            position: relative;
            z-index: 10;
            pointer-events: auto;
        }

        .stats-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 15px 18px;
            border-radius: 18px;
            box-shadow: var(--shadow);
            text-align: center;
            cursor: pointer;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 90px;
        }

        .stat-card:active { transform: scale(0.95); }
        .stat-label { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 3px; display: block; }
        .stat-value { font-weight: 900; font-size: 1.35rem; color: var(--primary); line-height: 1.2; }

        .goal-bar-container {
            width: 100%;
            height: 5px;
            background: var(--chip-bg);
            border-radius: 10px;
            margin-top: 8px;
            overflow: hidden;
        }

        .goal-bar { height: 100%; width: 0%; background: var(--primary); transition: width 0.4s ease; }

        .counter-wrapper-outer {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        .counter-wrapper {
            position: relative;
            z-index: 10;
            pointer-events: none;
            width: 300px;
            height: 300px;
        }

        .progress-svg {
            width: 300px;
            height: 300px;
            transform: rotate(-90deg);
        }

        .progress-bg { fill: none; stroke: var(--chip-bg); stroke-width: 8; }
        .progress-ring {
            fill: none;
            stroke: var(--primary);
            stroke-width: 8;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.3s ease, stroke 0.3s;
        }

        .counter-content {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .count-num {
            font-size: 5.5rem;
            font-weight: 900;
            color: var(--text-main);
            line-height: 1;
            direction: ltr;
            text-align: center;
            width: 100%;
            transition: transform 0.1s, font-size 0.2s ease;
        }

        .record-pill {
            background: var(--chip-bg);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 1rem;
            color: var(--text-muted);
            margin-top: 6px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .action-btn {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            border: none;
            background: var(--card-bg);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .action-btn:active { transform: translateY(2px); color: var(--primary); }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 2000;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }

        .modal.active { opacity: 1; visibility: visible; }

        .modal-content {
            background: var(--card-bg);
            width: 100%;
            max-width: 320px;
            border-radius: 25px;
            padding: 25px;
            text-align: center;
            transform: scale(0.9);
            transition: 0.3s;
        }

        .modal.active .modal-content { transform: scale(1); }

        .modal-title { font-weight: 900; font-size: 1.5rem; margin-bottom: 15px; color: var(--text-main); }
        .modal-text { color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; font-size: 1.05rem; font-weight: 600; }

        .modal-input {
            width: 100%;
            padding: 12px 20px;
            border-radius: 12px;
            border: 2px solid var(--chip-bg);
            background: var(--bg);
            color: var(--text-main);
            margin-bottom: 20px;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 700;
        }

        .modal-input:focus { outline: none; border-color: var(--primary); }

        .modal-btns { display: flex; gap: 10px; }
        .modal-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-confirm { background: var(--primary); color: white; }
        .btn-cancel { background: var(--chip-bg); color: var(--text-muted); }

        .floating-text {
            position: fixed;
            color: var(--primary);
            font-weight: 900;
            font-size: 1.5rem;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 1000;
        }

        @keyframes floatUp {
            from { transform: translateY(0) scale(1); opacity: 1; }
            to { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            z-index: 3000;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }

        .history-list { text-align: right; max-height: 300px; overflow-y: auto; padding: 5px; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="header-row">
        <div class="zikr-selector-container">
            <div class="active-zikr-pill" id="activeZikrPill" onclick="toggleZikrDropdown(event)">
                <svg class="chevron" viewBox="0 0 24 24"><path d="M7 10l5 5 5-5H7z"/></svg>
                <span id="activeZikrName">سبحان الله</span>
            </div>
            <div class="zikr-dropdown" id="zikrDropdown"></div>
        </div>
        <div style="display: flex; gap: 10px;">
            <button class="theme-btn" id="resetBtn" onclick="showResetGoalModal(event)">🔄</button>
            <button class="theme-btn" id="themeToggle" onclick="toggleTheme(event)">🌙</button>
        </div>
    </div>
    
    <div class="actions-row">
        <button class="action-btn" onclick="showHistoryModal(event)">📊</button>
    </div>
</div>

<div class="main-container">
    <div class="click-area" id="clickArea"></div>

    <div class="stats-grid-container" ontouchstart="event.stopPropagation()" onmousedown="event.stopPropagation()">
        <div class="stats-grid">
            <div class="stat-card" onclick="showEditGoalModal(event)">
                <span class="stat-label">الهدف اليومي</span>
                <div class="stat-value" id="currentGoalDisplay">33</div>
                <div class="goal-bar-container"><div class="goal-bar" id="mainGoalBar"></div></div>
            </div>
            <div class="stat-card">
                <span class="stat-label">المتبقي للهدف</span>
                <div class="stat-value" id="goalPercentText">33</div>
            </div>
        </div>
    </div>

    <div class="counter-wrapper-outer">
        <div class="counter-wrapper">
            <svg class="progress-svg">
                <circle class="progress-bg" cx="150" cy="150" r="85"></circle>
                <circle class="progress-ring" id="progressRing" cx="150" cy="150" r="85"></circle>
            </svg>
            <div class="counter-content">
                <div class="count-num" id="countDisplay">0</div>
                <div class="record-pill">👑 <span id="recordDisplay">0</span></div>
            </div>
        </div>
    </div>
</div>

<!-- Modals -->
<div id="addZikrModal" class="modal" onclick="if(event.target===this) hideAddZikrModal()">
    <div class="modal-content">
        <div class="modal-title">إضافة ذكر جديد</div>
        <input type="text" id="newZikrInput" class="modal-input" placeholder="اسم الذكر" autocomplete="off">
        <input type="number" id="newGoalInput" class="modal-input" placeholder="الهدف اليومي" value="33">
        <div class="modal-btns">
            <button class="modal-btn btn-confirm" onclick="confirmAddZikr(event)">إضافة</button>
            <button class="modal-btn btn-cancel" onclick="hideAddZikrModal(event)">إلغاء</button>
        </div>
    </div>
</div>

<div id="editGoalModal" class="modal" onclick="if(event.target===this) hideEditGoalModal()">
    <div class="modal-content">
        <div class="modal-title">تعديل الهدف</div>
        <input type="number" id="goalInput" class="modal-input" placeholder="الهدف الجديد">
        <div class="modal-btns">
            <button class="modal-btn btn-confirm" onclick="confirmEditGoal(event)">تأكيد</button>
            <button class="modal-btn btn-cancel" onclick="hideEditGoalModal(event)">إلغاء</button>
        </div>
    </div>
</div>

<div id="resetGoalModal" class="modal" onclick="if(event.target===this) hideResetGoalModal()">
    <div class="modal-content">
        <div class="modal-title">إعادة ضبط الهدف</div>
        <div class="modal-text">هل تريد إعادة ضبط العداد الحالي للصفر؟</div>
        <div class="modal-btns">
            <button class="modal-btn btn-confirm" onclick="confirmResetGoal(event)">نعم</button>
            <button class="modal-btn btn-cancel" onclick="hideResetGoalModal(event)">إلغاء</button>
        </div>
    </div>
</div>

<div id="deleteZikrModal" class="modal" onclick="if(event.target===this) hideDeleteZikrModal()">
    <div class="modal-content">
        <div class="modal-title">حذف الذكر</div>
        <div class="modal-text" id="deleteZikrText">هل تريد حذف هذا الذكر؟</div>
        <div class="modal-btns">
            <button class="modal-btn btn-confirm" style="background:#e17055;" onclick="confirmDeleteZikr(event)">حذف</button>
            <button class="modal-btn btn-cancel" onclick="hideDeleteZikrModal(event)">إلغاء</button>
        </div>
    </div>
</div>

<div id="historyModal" class="modal" onclick="if(event.target===this) hideHistoryModal()">
    <div class="modal-content">
        <div class="modal-title">سجل التسبيح</div>
        <div id="historyContent" class="history-list"></div>
        <div class="modal-btns">
            <button class="modal-btn btn-cancel" onclick="hideHistoryModal(event)">إغلاق</button>
        </div>
    </div>
</div>

<script>
    // 1. البيانات والتحميل
    let zikrs = JSON.parse(localStorage.getItem('zikrs')) || [
        { name: "سبحان الله", count: 0, goal: 33, total: 0 },
        { name: "الحمد لله", count: 0, goal: 33, total: 0 },
        { name: "الله أكبر", count: 0, goal: 34, total: 0 }
    ];

    let currentIdx = parseInt(localStorage.getItem('currentZikrIdx')) || 0;
    let autoInterval = null;
    let vibrationEnabled = localStorage.getItem('vibrationEnabled') !== 'false';

    const ring = document.getElementById('progressRing');
    const radius = ring.r.baseVal.value;
    const circumference = 2 * Math.PI * radius;
    ring.style.strokeDasharray = `${circumference} ${circumference}`;

    // دالة الاهتزاز - محسنة
    function doVibrate(duration = 10) {
        if (!vibrationEnabled) return;
        
        try {
            // التحقق من وجود خاصية الاهتزاز
            if (window.navigator && window.navigator.vibrate) {
                window.navigator.vibrate(duration);
            } 
            // لبعض المتصفحات على Android
            else if (window.navigator && window.navigator.webkitVibrate) {
                window.navigator.webkitVibrate(duration);
            }
            // للمتصفحات القديمة
            else if (window.navigator && window.navigator.mozVibrate) {
                window.navigator.mozVibrate(duration);
            }
        } catch(e) {
            console.log("Vibration not supported:", e);
        }
    }

    // تحديث حالة زر الاهتزاز
    function updateVibrationButton() {
        const btn = document.getElementById('vibrationToggle');
        if (vibrationEnabled) {
            btn.classList.add('active');
        } else {
            btn.classList.remove('active');
        }
    }

    // الأذكار التي تظهر لها الدائرة فقط
    const RING_ZIKRS = ["سبحان الله", "الحمد لله", "الله أكبر"];
    const RING_TARGET = 33;

    // 2. تحديث الشاشة
    function updateDisplay() {
        let z = zikrs[currentIdx];
        
        if (z.count === z.goal) {
            doVibrate(100);
            spawnConfetti();
        }

        document.getElementById('activeZikrName').innerText = z.name;
        document.getElementById('countDisplay').innerText = z.count;
        const digits = String(z.count).length;
        const fontSize = digits <= 2 ? '4.5rem' : digits === 3 ? '3.5rem' : digits === 4 ? '2.8rem' : '2.2rem';
        document.getElementById('countDisplay').style.fontSize = fontSize;
        document.getElementById('recordDisplay').innerText = z.total;
        document.getElementById('currentGoalDisplay').innerText = z.goal;
        
        const remaining = Math.max(0, z.goal - z.count);
        document.getElementById('goalPercentText').innerText = remaining;

        // الدائرة تظهر فقط لسبحان الله والحمد لله والله أكبر وتكتمل عند 33 ثابتة
        const hasRing = RING_ZIKRS.includes(z.name);
        if (hasRing) {
            ring.style.opacity = '1';
            const ringProgress = z.count % RING_TARGET;
            const offset = circumference - ((ringProgress / RING_TARGET) * circumference);
            ring.style.strokeDashoffset = offset;
        } else {
            ring.style.opacity = '0';
            ring.style.strokeDashoffset = circumference;
        }

        const barWidth = (z.count / z.goal) * 100;
        document.getElementById('mainGoalBar').style.width = `${Math.min(barWidth, 100)}%`;
        
        localStorage.setItem('zikrs', JSON.stringify(zikrs));
        localStorage.setItem('currentZikrIdx', currentIdx);
        renderDropdown();
    }

    // 3. التسبيح مع منع التكرار المزدوج
    let processingIncrement = false;
    let lastVibrationTime = 0;

    function increment() {
        if (processingIncrement) return;
        processingIncrement = true;
        
        zikrs[currentIdx].count++;
        zikrs[currentIdx].total++;
        
        // اهتزاز لكل تسبيحة - مع منع الاهتزاز المتكرر جداً
        const now = Date.now();
        if (now - lastVibrationTime > 30) {
            doVibrate(10);
            lastVibrationTime = now;
        }
        
        showFloatingText("+1");
        updateDisplay();
        
        setTimeout(() => { processingIncrement = false; }, 50);
    }

    // الضغط المطول
    let pressTimer = null;

    function startAutoIncrement() {
        if (autoInterval) clearInterval(autoInterval);
        pressTimer = setTimeout(() => {
            autoInterval = setInterval(() => {
                if (!processingIncrement) increment();
            }, 120);
        }, 600);
    }

    function stopAutoIncrement() {
        clearTimeout(pressTimer);
        if (autoInterval) {
            clearInterval(autoInterval);
            autoInterval = null;
        }
    }

    // التعامل مع أحداث اللمس والماوس
    const clickArea = document.getElementById('clickArea');
    let isTouchDevice = false;

    clickArea.addEventListener('touchstart', (e) => {
        if (e.target === clickArea) {
            e.preventDefault();
            isTouchDevice = true;
            increment();
            startAutoIncrement();
        }
    });
    clickArea.addEventListener('touchend', stopAutoIncrement);
    clickArea.addEventListener('touchcancel', stopAutoIncrement);

    clickArea.addEventListener('mousedown', (e) => {
        if (isTouchDevice) {
            isTouchDevice = false;
            return;
        }
        if (e.target === clickArea) {
            e.preventDefault();
            increment();
            startAutoIncrement();
        }
    });
    clickArea.addEventListener('mouseup', stopAutoIncrement);
    clickArea.addEventListener('mouseleave', stopAutoIncrement);

    // 4. إدارة القائمة المنسدلة
    function toggleZikrDropdown(e) {
        e.stopPropagation();
        const dropdown = document.getElementById('zikrDropdown');
        const pill = document.getElementById('activeZikrPill');
        dropdown.classList.toggle('active');
        pill.classList.toggle('open');
    }

    function closeAllDropdowns(e) {
        const dropdown = document.getElementById('zikrDropdown');
        const pill = document.getElementById('activeZikrPill');
        if (!dropdown.contains(e.target) && !pill.contains(e.target)) {
            dropdown.classList.remove('active');
            pill.classList.remove('open');
        }
    }

    document.addEventListener('click', closeAllDropdowns);
    document.addEventListener('touchstart', closeAllDropdowns, { passive: true });

    function renderDropdown() {
        const container = document.getElementById('zikrDropdown');
        const BASE_COUNT = 3;
        container.innerHTML = zikrs.map((z, i) => `
            <div class="zikr-option-wrapper">
                <button class="zikr-option ${i === currentIdx ? 'selected' : ''}" onclick="selectZikr(event, ${i})">
                    ${z.name} <small>(${z.total})</small>
                </button>
                ${i >= BASE_COUNT ? `<button class="delete-zikr-btn" onclick="deleteZikr(event, ${i})" title="حذف">✕</button>` : ''}
            </div>
        `).join('') + `<button class="add-zikr-opt" onclick="showAddZikrModal(event)">+ إضافة ذكر</button>`;
    }

    let pendingDeleteIdx = null;

    function deleteZikr(e, i) {
        e.stopPropagation();
        if (i < 3) return;
        pendingDeleteIdx = i;
        document.getElementById('deleteZikrText').innerText = `هل تريد حذف "${zikrs[i].name}"؟`;
        document.getElementById('deleteZikrModal').classList.add('active');
    }

    function hideDeleteZikrModal(e) {
        if (e) e.stopPropagation();
        document.getElementById('deleteZikrModal').classList.remove('active');
        pendingDeleteIdx = null;
    }

    function confirmDeleteZikr(e) {
        e.stopPropagation();
        const i = pendingDeleteIdx;
        if (i === null || i < 3) return;
        zikrs.splice(i, 1);
        if (currentIdx >= zikrs.length) currentIdx = zikrs.length - 1;
        if (currentIdx === i) currentIdx = 0;
        hideDeleteZikrModal();
        updateDisplay();
    }

    function selectZikr(e, i) {
        e.stopPropagation();
        currentIdx = i;
        document.getElementById('zikrDropdown').classList.remove('active');
        document.getElementById('activeZikrPill').classList.remove('open');
        updateDisplay();
    }

    // 5. وظائف الأزرار
    function toggleTheme(e) {
        e.stopPropagation();
        document.body.classList.toggle('dark-mode');
        document.getElementById('themeToggle').innerText = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    }
    
    // تبديل الاهتزاز
    function toggleVibration(e) {
        e.stopPropagation();
        vibrationEnabled = !vibrationEnabled;
        localStorage.setItem('vibrationEnabled', vibrationEnabled);
        updateVibrationButton();
        if (vibrationEnabled) {
            doVibrate(50);
        }
    }

    function showAddZikrModal(e) {
        e.stopPropagation();
        document.getElementById('addZikrModal').classList.add('active');
        document.getElementById('zikrDropdown').classList.remove('active');
    }

    function hideAddZikrModal(e) {
        if(e) e.stopPropagation();
        document.getElementById('addZikrModal').classList.remove('active');
    }

    function confirmAddZikr(e) {
        e.stopPropagation();
        const name = document.getElementById('newZikrInput').value.trim();
        const goal = parseInt(document.getElementById('newGoalInput').value);
        if (name && goal > 0) {
            zikrs.push({ name: name, count: 0, goal: goal, total: 0 });
            currentIdx = zikrs.length - 1;
            updateDisplay();
            hideAddZikrModal();
            document.getElementById('newZikrInput').value = '';
            document.getElementById('newGoalInput').value = '';
        }
    }

    function showHistoryModal(e) {
        e.stopPropagation();
        const content = document.getElementById('historyContent');
        content.innerHTML = zikrs.map(z => `<div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid var(--chip-bg)"><span>${z.name}</span><b>${z.total}</b></div>`).join('');
        document.getElementById('historyModal').classList.add('active');
    }

    function hideHistoryModal(e) {
        if(e) e.stopPropagation();
        document.getElementById('historyModal').classList.remove('active');
    }

    function showEditGoalModal(e) { 
        e.stopPropagation(); 
        document.getElementById('editGoalModal').classList.add('active'); 
        document.getElementById('goalInput').value = zikrs[currentIdx].goal;
    }
    function hideEditGoalModal(e) { if(e) e.stopPropagation(); document.getElementById('editGoalModal').classList.remove('active'); }
    function confirmEditGoal(e) {
        e.stopPropagation();
        const newGoal = parseInt(document.getElementById('goalInput').value);
        if (newGoal > 0) {
            zikrs[currentIdx].goal = newGoal;
            if (zikrs[currentIdx].count >= newGoal) {
                zikrs[currentIdx].count = 0;
            }
            updateDisplay();
            hideEditGoalModal();
        }
    }

    function showResetGoalModal(e) { e.stopPropagation(); document.getElementById('resetGoalModal').classList.add('active'); }
    function hideResetGoalModal(e) { if(e) e.stopPropagation(); document.getElementById('resetGoalModal').classList.remove('active'); }
    function confirmResetGoal(e) {
        e.stopPropagation();
        zikrs[currentIdx].count = 0;
        updateDisplay();
        hideResetGoalModal();
    }

    // تأثيرات بصرية
    function showFloatingText(txt) {
        const el = document.createElement('div');
        el.className = 'floating-text';
        el.innerText = txt;
        el.style.left = `${Math.random() * 40 + 30}%`;
        el.style.top = `45%`;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 800);
    }

    function spawnConfetti() {
        for (let i = 0; i < 30; i++) {
            const c = document.createElement('div');
            c.className = 'confetti-piece';
            c.style.left = Math.random() * 100 + 'vw';
            c.style.backgroundColor = `hsl(${Math.random() * 360}, 70%, 50%)`;
            c.style.animationDuration = (Math.random() * 2 + 1) + 's';
            document.body.appendChild(c);
            setTimeout(() => c.remove(), 3000);
        }
    }

    // بدء التطبيق
    updateDisplay();
    updateVibrationButton();
    
    // تفعيل ملء الشاشة
    function autoFullscreen() {
        try {
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        } catch(e) {}
        
        const enableFullscreenOnFirstClick = () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
            document.removeEventListener('click', enableFullscreenOnFirstClick);
            document.removeEventListener('touchstart', enableFullscreenOnFirstClick);
        };
        document.addEventListener('click', enableFullscreenOnFirstClick);
        document.addEventListener('touchstart', enableFullscreenOnFirstClick);
    }
    
    autoFullscreen();
</script>
</body>
</html>
